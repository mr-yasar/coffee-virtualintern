<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aroma Lounge - Coffee Rating & Reviews{% endblock %}</title>
    <!-- Google Fonts: Playfair Display for headers, Outfit for UI, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="glass-background"></div>
    <div class="background-decorations">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="app-container">
        <!-- Main Content Area -->
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <!-- Elegant Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 Aroma Lounge. Crafted for true coffee connoisseurs.</p>
        </footer>
    </div>

    <!-- Custom Client Logic -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
